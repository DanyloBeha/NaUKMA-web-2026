<!DOCTYPE html>
<html lang="uk">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Danylo Beha">
        <title>Buy List</title>
        <link rel="stylesheet" href="buylistStyles.css">
    </head>

    <body>
        <div class="container">

            <div class="container-menu">
                <div class="container-menu-line">
                    <form>
                        <label>
                            <input type="text" name="item" placeholder="Назва товару">
                        </label>
                        <button id="addButton" data-toolpit="Додати товар до списку">Додати</button>
                    </form>
                </div>

                <hr>

                <div class="container-menu-line">
                    <span class="menuItemName"><s>Помідори</s></span>
                    <div class="middleBtn">
                        <span class="menuAmount">2</span>
                    </div>
                    <div class="endBtn">
                        <button class="buyButton" data-toolpit="Позначити, як не куплене">Не куплено</button>
                    </div>
                </div>

                <hr>

                <div class="container-menu-line">
                    <span class="menuItemName">Печиво</span>
                    <div class="middleBtn">
                        <button class="roundButton minusButton" data-toolpit="Зменшити кількість">-</button>
                        <span class="menuAmount">2</span>
                        <button class="roundButton plusButton" data-toolpit="Збільшити кількість">+</button>
                    </div>
                    <div class="endBtn">
                        <button class="buyButton" data-toolpit="Позначити, як куплене">Куплено</button>
                        <button class="delButton" data-toolpit="Вилучити позицію">✖</button>
                    </div>
                </div>

                <hr>

                <div class="container-menu-line">
                    <span class="menuItemName" id="inEdit">Cир</span>
                    <div class="middleBtn">
                        <button class="roundButton minusButton" data-toolpit="Зменшити кількість">-</button>
                        <span class="menuAmount">1</span>
                        <button class="roundButton plusButton" data-toolpit="Збільшити кількість">+</button>
                    </div>
                    <div class="endBtn">
                        <button class="buyButton" data-toolpit="Позначити, як куплене">Куплено</button>
                        <button class="delButton" data-toolpit="Вилучити позицію">✖</button>
                    </div>
                </div>
            </div>

            <div class="container-list">
                <h2>Залишилося</h2>

                <hr>

                <span class="item">Печиво
                    <span class="amount">2</span>
                </span>
                <span class="item">Сир
                    <span class="amount">1</span>
                </span>

                <hr>

                <h2>Куплено</h2>

                <hr>

                <span class="item">Помідори
                    <span class="amount">2</span>
                </span>
            </div>
        </div>

        <div class="badge">
            <h2>Buy list</h2>
            <div id="labelName">
                <p id="label">Created by:</p>
                <p id="name">Danylo Beha</p>
            </div>
        </div>


    </body>


</html>
