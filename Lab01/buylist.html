<!DOCTYPE html>
<html lang="uk">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="author" content="Danylo Beha">
        <title>Buy List</title>
        <link rel="stylesheet" href="buylistStyles.css">
        <script src="buylist.js" defer></script>
    </head>

    <body>
        <div class="container">

            <div class="container-menu">
                <div class="container-menu-line">
                    <form>
                        <label>
                            <input id="newItem" type="text" name="item" placeholder="Назва товару">
                        </label>
                        <button id="addButton" data-toolpit="Додати товар до списку">Додати</button>
                    </form>
                </div>

                <div class="container-menu-lines">
                </div>
            </div>

            <div class="container-list">
                <h2>Залишилося</h2>

                <hr>

                <div class="container-list-notBought">
                </div>

                <hr>

                <h2>Куплено</h2>

                <hr>

                <div class="container-list-bought">

                </div>
            </div>
        </div>

        <div class="badge">
            <h2>Buy list</h2>
            <div id="labelName">
                <p id="label">Created by:</p>
                <p id="name">Danylo Beha</p>
            </div>
        </div>


    </body>


</html>
