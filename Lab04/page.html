<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lab04 - Task 8</title>
    <meta name="author" content="Danylo Beha">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="slider">
        <button class="prev">‹</button>
        <div class="slides">
            <img src="img1.jpg" alt="Image 1" class="slide active">
            <img src="img2.jpg" alt="Image 2" class="slide">
            <img src="img3.jpg" alt="Image 3" class="slide">
            <img src="img4.jpg" alt="Image 4" class="slide">
            <img src="img5.jpg" alt="Image 5" class="slide">
        </div>
        <button class="next">›</button>
        <div class="dots">
            <span class="dot active" data-slide="0"></span>
            <span class="dot" data-slide="1"></span>
            <span class="dot" data-slide="2"></span>
            <span class="dot" data-slide="3"></span>
            <span class="dot" data-slide="4"></span>
        </div>
    </div>
</body>
</html>
